services:
    postgres:
      image: postgres:13
      container_name: movie-postgres
      environment:
        - POSTGRES_USER=${DB_USER}
        - POSTGRES_PASSWORD=${DB_PASSWORD}
        - POSTGRES_DB=${DB_NAME}
        - TZ=Asia/Ho_Chi_Minh
        - PGTZ=Asia/Ho_Chi_Minh
      ports:
        - "${DB_PORT}:5432"
      volumes:
         - pgdata:/var/lib/postgresql/data
         - ./data-enrichment/data/etl/extracted:/docker-entrypoint-initdb.d/extracted
         - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      networks:
        - movie-net
      deploy:
        resources:
          limits:
            memory: "${MEM_LIMIT_POSTGRES}"
          reservations:
            memory: "512m"

    pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      ports:
        - "5050:80"
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
        PGADMIN_DEFAULT_PASSWORD: admin
      depends_on:
        - postgres

    elasticsearch:
      image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
      container_name: elasticsearch
      environment:
        - discovery.type=single-node
        - xpack.security.enabled=false
        - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      ports:
        - "${ES_PORT_9200}:9200"
        - "${ES_PORT_9300}:9300"
      deploy:
        resources:
          limits:
            memory: "${MEM_LIMIT_ES}"
          reservations:
            memory: "1g"
      networks:
        - movie-net
    recommendation:
      build:
        context: ./movie-recommendation
        dockerfile: Dockerfile
      container_name: movie-recommendation
      ports:
        - "${RECOMMENDATION_PORT}:8002"
      env_file:
        - .env
      environment:
        - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      volumes:
        - ./model-store/recommendation_models:/model-store/recommendation_models
      depends_on:
        - postgres
        - elasticsearch
      networks:
        - movie-net
      deploy:
        resources:
          limits:
            memory: ${MEM_LIMIT_API}
    chatbot:
      build: ./movie-chatbot
      container_name: movie-chatbot
      ports:
        - "${CHATBOT_PORT}:8001"
      env_file:
        - .env
      environment:
        - ES_HOST=http://elasticsearch:9200
        - HF_TOKEN=${HF_TOKEN}
        - HF_HOME=/model-store/chatbot_models/.cache
      volumes:
        - ./model-store/chatbot_models:/model-store/chatbot_models
      depends_on:
        - elasticsearch
      networks:
        - movie-net
      deploy:
        resources:
          limits:
            memory: ${MEM_LIMIT}
    
    movie-backend:
      build: ./movie-backend
      container_name: movie-backend
      ports:
        - "${BACKEND_PORT}:8080"
      env_file:
        - .env
      depends_on:
        - postgres
        - elasticsearch
      networks:
        - movie-net
      deploy:
        resources:
          limits:
            memory: ${MEM_LIMIT_API}

    movie-frontend:
      build: 
        context: ./movie-frontend
        dockerfile: Dockerfile
      container_name: movie-frontend
      ports:
        - "${FRONTEND_PORT}:3000"
      env_file:
        - .env
      depends_on:
        - movie-backend
      networks:
        - movie-net
      deploy:
        resources:
          limits:
            memory: ${MEM_LIMIT_FRONTEND}

networks:
  movie-net:
    driver: bridge

volumes:
  pgdata: